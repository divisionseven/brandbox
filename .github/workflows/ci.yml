# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
#
# Continuous Integration
# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push to main
#   • Pull requests targeting main
#   • workflow_call — invoked directly by release.yml before any build/publish
#
# Jobs:
#   lint    → fast quality gate (one OS, one runtime version)
#   test    → full matrix (all OS × all runtime versions) — only runs if lint passes
#
# ──────────────────────────────────────────────────────────────────────────────

name: ♻️ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # makes this callable from release.yml with: uses: ./.github/workflows/ci.yml

# Cancel in-progress runs for the same ref (saves minutes on rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Lint / Format / Type-check ───────────────────────────────────────────────
  # Runs on a single fast runner. No point running linting on every OS/version.
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── Linting ───────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check .

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Format check (ruff format)
        run: ruff format --check .

      # ── Type checking ─────────────────────────────────────────────────────────
      - name: Type check (mypy)
        run: mypy .

  # ── Test Matrix ───────────────────────────────────────────────────────────────
  # Runs the full test suite across all supported OS and runtime version combos.
  # Only runs if lint passes — no point testing broken code.
  test:
    name: Test — ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # run all matrix entries even if one fails, for full visibility
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system dependencies (cairo for SVG rendering)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libcairo2-dev
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cairo
            echo "DYLD_LIBRARY_PATH=/opt/homebrew/lib:\$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" = "Windows" ]; then
            if command -v vcpkg &> /dev/null; then
              VCPKG_CMD="vcpkg"
            elif [ -n "$VCPKG_ROOT" ] && { [ -f "$VCPKG_ROOT/vcpkg" ] || [ -f "$VCPKG_ROOT/vcpkg.exe" ]; }; then
              VCPKG_CMD="$VCPKG_ROOT/vcpkg"
            else
              echo "::warning::vcpkg not found — cairo may not be available"
              VCPKG_CMD=""
            fi
            if [ -n "$VCPKG_CMD" ]; then
              $VCPKG_CMD install cairo --triplet x64-windows
              echo "CAIROCFFI_DLL_DIRECTORIES=$VCPKG_ROOT/installed/x64-windows/bin" >> $GITHUB_ENV
            fi
          fi
        shell: bash

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite (pytest)
        run: pytest --tb=short -q --cov=brandbox --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
