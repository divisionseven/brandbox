# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
#
# Continuous Integration
# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push to main
#   • Pull requests targeting main
#   • workflow_call — invoked directly by release.yml before any build/publish
#
# Jobs:
#   lint    → fast quality gate (one OS, one runtime version)
#   test    → full matrix (all OS × all runtime versions) — only runs if lint passes
#
# ──────────────────────────────────────────────────────────────────────────────

name: ♻️ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # makes this callable from release.yml with: uses: ./.github/workflows/ci.yml

# Cancel in-progress runs for the same ref (saves minutes on rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Lint / Format / Type-check ───────────────────────────────────────────────
  # Runs on a single fast runner. No point running linting on every OS/version.
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      # ── Linting ───────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: ruff check .

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Format check (ruff format)
        run: ruff format --check .

      # ── Type checking ─────────────────────────────────────────────────────────
      - name: Type check (mypy)
        run: mypy .

  # ── Test Matrix ───────────────────────────────────────────────────────────────
  # Runs the full test suite across all supported OS and runtime version combos.
  # Only runs if lint passes — no point testing broken code.
  test:
    name: Test — ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # run all matrix entries even if one fails, for full visibility
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite (pytest)
        run: pytest --tb=short -q --cov=brandbox --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
